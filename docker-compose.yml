version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────
  db:
    image: postgres:15-alpine
    container_name: bateria-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bateria_preguntas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────
  backend:
    build: ./backend
    container_name: bateria-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bateria_preguntas}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_minimum_32_characters!!}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_min_32_chars!!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AI_SERVICE_URL: http://ai-microservice:4001/api/v1
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────
  frontend:
    build: ./frontend
    container_name: bateria-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─── AI Microservice ────────────────────────
  ai-microservice:
    build: ./ai-microservice
    container_name: bateria-ai
    restart: unless-stopped
    env_file:
      - ./ai-microservice/.env
    ports:
      - "4001:4001"

volumes:
  postgres_data:
